<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>纳指加仓模型</title>
<style>
:root {
    --bg: #0f1419; --card: #1a2332; --text: #e0e6ed; 
    --green: #00d084; --red: #ff4757; --yellow: #ffa502; --orange: #ff7f50;
    --blue: #3742fa; --gray: #57606f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    line-height:1.6; padding-bottom: 40px;
}
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
header { text-align:center; padding: 20px 0; border-bottom: 1px solid var(--card); margin-bottom: 16px; }
header h1 { font-size: 24px; letter-spacing: 2px; }
header p { color: var(--gray); font-size: 12px; margin-top: 4px; }

.card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 14px; color: var(--gray); margin-bottom: 12px; display:flex; align-items:center; gap:6px; }

.price-main { text-align:center; padding: 10px 0; }
.price-num { font-size: 48px; font-weight: 700; letter-spacing: -1px; }
.price-change { font-size: 18px; margin-top: 4px; }
.price-up { color: var(--green); } .price-down { color: var(--red); }

.risk-badge { 
    display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;
    margin-top: 10px;
}
.risk-high { background: rgba(255,71,87,0.2); color: var(--red); border: 1px solid var(--red); }
.risk-mid { background: rgba(255,127,80,0.2); color: var(--orange); border: 1px solid var(--orange); }
.risk-low { background: rgba(255,165,2,0.2); color: var(--yellow); border: 1px solid var(--yellow); }
.risk-min { background: rgba(0,208,132,0.2); color: var(--green); border: 1px solid var(--green); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.stat-item { text-align: center; padding: 12px 4px; background: rgba(255,255,255,0.03); border-radius: 12px; }
.stat-label { font-size: 11px; color: var(--gray); margin-bottom: 4px; white-space:nowrap; }
.stat-value { font-size: 18px; font-weight: 700; }

.action-box { 
    padding: 16px; border-radius: 12px; border-left: 4px solid; margin-top: 12px;
    background: rgba(255,255,255,0.02);
}
.action-stop { border-color: var(--red); }
.action-warn { border-color: var(--orange); }
.action-ok { border-color: var(--green); }
.action-text { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.action-sub { font-size: 13px; color: var(--gray); }

.history-list { max-height: 350px; overflow-y: auto; }
.history-item { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.history-item:last-child { border-bottom: none; }
.history-date { font-size: 13px; color: var(--gray); }
.history-info { text-align: right; }
.history-price { font-weight: 600; font-size: 15px; }
.history-tag { 
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 6px;
}
.tag-batch1 { background: var(--green); color: #000; }
.tag-batch2 { background: var(--yellow); color: #000; }
.tag-batch3 { background: var(--orange); color: #fff; }
.tag-batch4 { background: var(--red); color: #fff; }

.divider { height: 1px; background: var(--card); margin: 16px 0; }
.loading { text-align: center; padding: 40px; color: var(--gray); }
.footer { text-align: center; padding: 20px; font-size: 11px; color: var(--gray); }

.alert-bar {
    padding: 14px; border-radius: 12px; margin-bottom: 16px; text-align: center;
}
.alert-wait { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); }
.alert-ready { background: rgba(0,208,132,0.1); border: 1px solid rgba(0,208,132,0.3); }
.alert-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.alert-desc { font-size: 13px; color: var(--gray); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>纳指加仓模型</h1>
        <p>长期持有 · 只抄底 · 不卖出</p>
    </header>

    <div id="loading" class="loading">正在获取市场数据...</div>
    <div id="content" style="display:none;">
        
        <div id="alertBar" class="alert-bar"></div>

        <div class="card">
            <div class="card-title">📊 纳斯达克综合指数</div>
            <div class="price-main">
                <div id="currentPrice" class="price-num">--</div>
                <div id="priceChange" class="price-change">--</div>
                <div id="riskBadge" class="risk-badge"></div>
            </div>
            <div class="divider"></div>
            <div class="grid-2">
                <div class="stat-item">
                    <div class="stat-label">1年高点回撤</div>
                    <div id="statDD" class="stat-value">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">RSI(14)</div>
                    <div id="statRSI" class="stat-value">--</div>
                </div>
            </div>
            <div class="grid-3" style="margin-top:10px;">
                <div class="stat-item">
                    <div class="stat-label">20日涨幅</div>
                    <div id="stat20D" class="stat-value">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">估值百分位</div>
                    <div id="statPercentile" class="stat-value">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">恐慌指数</div>
                    <div id="statVIX" class="stat-value">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎯 新增资金操作建议</div>
            <div id="actionBox" class="action-box">
                <div id="actionText" class="action-text">--</div>
                <div id="actionSub" class="action-sub">--</div>
            </div>
            <div style="margin-top:12px; font-size:13px; color:var(--gray);">
                <div id="nextBuyInfo">--</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 近1年加仓记录</div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="footer">
        数据仅供参考，不构成投资建议 · 恐慌指数为20日波动率年化<br>
        模型规则：回撤≥10%/15%/20%/25% 分4批加仓 · 不卖出 · 长期持有
    </div>
</div>

<script>
const CONFIG = {
    initialDD: -10,
    stepDD: -5,
    maxBatch: 4,
    rsiPeriod: 14,
    lookback: 252
};

let priceData = [];

function saveData() {
    localStorage.setItem('ndx_history', JSON.stringify(priceData));
    localStorage.setItem('ndx_last_update', new Date().toISOString());
}

function loadLocal() {
    const saved = localStorage.getItem('ndx_history');
    if (saved) {
        try {
            priceData = JSON.parse(saved);
            return true;
        } catch(e) { return false; }
    }
    return false;
}

function calcRSI(data, period) {
    if (data.length < period + 1) return 50;
    let gains = 0, losses = 0;
    for (let i = data.length - period; i < data.length; i++) {
        const change = data[i].close - data[i-1].close;
        if (change > 0) gains += change;
        else losses -= change;
    }
    const avgGain = gains / period;
    const avgLoss = losses / period;
    if (avgLoss === 0) return 100;
    const rs = avgGain / avgLoss;
    return 100 - (100 / (1 + rs));
}

function calcHigh252(data) {
    const slice = data.slice(-CONFIG.lookback);
    return Math.max(...slice.map(d => d.close));
}

function calcChange20D(data) {
    if (data.length < 21) return 0;
    const cur = data[data.length-1].close;
    const prev = data[data.length-21].close;
    return (cur / prev - 1) * 100;
}

function calcPercentile(data, period) {
    if (data.length < period) return 50;
    const slice = data.slice(-period);
    const current = slice[slice.length-1].close;
    const sorted = slice.map(d => d.close).sort((a,b) => a-b);
    let rank = 0;
    for (let i = 0; i < sorted.length; i++) {
        if (sorted[i] <= current) rank++;
        else break;
    }
    return (rank / sorted.length) * 100;
}

function calcVol(data, period) {
    if (data.length < period + 1) return 0;
    const returns = [];
    for (let i = data.length - period; i < data.length; i++) {
        returns.push(Math.log(data[i].close / data[i-1].close));
    }
    const mean = returns.reduce((a,b) => a+b, 0) / returns.length;
    const variance = returns.reduce((s, r) => s + (r-mean)**2, 0) / returns.length;
    const std = Math.sqrt(variance);
    return std * Math.sqrt(252) * 100;
}

function getRiskLevel(dd, rsi, change20d) {
    if (rsi > 80 || dd > -5 || change20d > 8) return { level: 'high', text: '🔴 高风险', class: 'risk-high' };
    if (rsi > 70 || dd > -10 || change20d > 5) return { level: 'mid', text: '🟠 中风险', class: 'risk-mid' };
    if (rsi > 50 || dd > -15) return { level: 'low', text: '🟡 低风险', class: 'risk-low' };
    return { level: 'min', text: '🟢 极低风险', class: 'risk-min' };
}

function backtestBuys(data) {
    const cycles = [];
    let current = null;
    
    for (let i = CONFIG.lookback; i < data.length; i++) {
        const row = data[i];
        const slice = data.slice(i - CONFIG.lookback, i + 1);
        const high252 = Math.max(...slice.map(d => d.close));
        const dd = (row.close / high252 - 1) * 100;
        
        if (current === null && dd <= CONFIG.initialDD) {
            current = { startDate: row.date, startPrice: row.close, startDD: dd, buys: [{batch:1, price: row.close, dd, date: row.date}], nextThreshold: CONFIG.initialDD + CONFIG.stepDD, lowestDD: dd };
        } else if (current) {
            if (dd < current.lowestDD) current.lowestDD = dd;
            const batchCount = current.buys.length;
            if (batchCount < CONFIG.maxBatch && dd <= current.nextThreshold) {
                current.buys.push({batch: batchCount + 1, price: row.close, dd, date: row.date});
                current.nextThreshold += CONFIG.stepDD;
            }
            if (dd > -3 && (new Date(row.date) - new Date(current.startDate)) / 86400000 > 30) {
                current.endDate = row.date;
                current.endPrice = row.close;
                cycles.push(current);
                current = null;
            }
        }
    }
    if (current) cycles.push(current);
    return cycles;
}

function render() {
    if (priceData.length < 30) {
        document.getElementById('loading').textContent = '数据不足，请刷新重试或等待数据累积';
        return;
    }
    
    const last = priceData[priceData.length - 1];
    const prev = priceData[priceData.length - 2] || last;
    const high252 = calcHigh252(priceData);
    const dd = (last.close / high252 - 1) * 100;
    const rsi = calcRSI(priceData, CONFIG.rsiPeriod);
    const change20d = calcChange20D(priceData);
    const percentile = calcPercentile(priceData, 252);
    const vol = calcVol(priceData, 20);
    const change1d = (last.close / prev.close - 1) * 100;
    const risk = getRiskLevel(dd, rsi, change20d);
    
    document.getElementById('currentPrice').textContent = last.close.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const changeEl = document.getElementById('priceChange');
    changeEl.textContent = (change1d >= 0 ? '+' : '') + change1d.toFixed(2) + '%';
    changeEl.className = 'price-change ' + (change1d >= 0 ? 'price-up' : 'price-down');
    
    const badge = document.getElementById('riskBadge');
    badge.textContent = risk.text;
    badge.className = 'risk-badge ' + risk.class;
    
    document.getElementById('statDD').textContent = dd.toFixed(1) + '%';
    document.getElementById('statDD').style.color = dd <= -10 ? 'var(--green)' : (dd <= -5 ? 'var(--yellow)' : 'var(--red)');
    document.getElementById('statRSI').textContent = rsi.toFixed(1);
    document.getElementById('statRSI').style.color = rsi > 80 ? 'var(--red)' : (rsi > 70 ? 'var(--orange)' : 'var(--text)');
    document.getElementById('stat20D').textContent = (change20d >= 0 ? '+' : '') + change20d.toFixed(1) + '%';
    document.getElementById('stat20D').style.color = change20d > 8 ? 'var(--red)' : (change20d > 5 ? 'var(--orange)' : 'var(--text)');
    document.getElementById('statPercentile').textContent = percentile.toFixed(0) + '%';
    document.getElementById('statPercentile').style.color = percentile > 90 ? 'var(--red)' : (percentile > 70 ? 'var(--orange)' : 'var(--green)');
    document.getElementById('statVIX').textContent = vol.toFixed(1);
    document.getElementById('statVIX').style.color = vol > 25 ? 'var(--red)' : (vol > 15 ? 'var(--orange)' : 'var(--green)');
    
    const actionBox = document.getElementById('actionBox');
    const actionText = document.getElementById('actionText');
    const actionSub = document.getElementById('actionSub');
    const nextBuyInfo = document.getElementById('nextBuyInfo');
    
    if (risk.level === 'high') {
        actionBox.className = 'action-box action-stop';
        actionText.textContent = '❌ 停止买入';
        actionSub.textContent = '市场过热，新增资金严禁入场，耐心等待回调';
    } else if (risk.level === 'mid') {
        actionBox.className = 'action-box action-warn';
        actionText.textContent = '⏸️ 暂停加仓';
        actionSub.textContent = '位置偏高，建议观望，不急于进场';
    } else if (risk.level === 'low') {
        actionBox.className = 'action-box action-ok';
        actionText.textContent = '✅ 可以首仓';
        actionSub.textContent = '回撤达10%，可建首批仓位';
    } else {
        actionBox.className = 'action-box action-ok';
        actionText.textContent = '🚀 全力抄底';
        actionSub.textContent = '深度回调，建议分批重仓';
    }
    
    const levels = [CONFIG.initialDD, CONFIG.initialDD + CONFIG.stepDD, CONFIG.initialDD + CONFIG.stepDD*2, CONFIG.initialDD + CONFIG.stepDD*3];
    let nextInfo = '';
    for (let i = 0; i < levels.length; i++) {
        if (dd > levels[i]) {
            const need = (dd - levels[i]).toFixed(1);
            const targetPrice = (high252 * (1 + levels[i]/100)).toFixed(0);
            nextInfo = `距离第${i+1}批加仓（回撤${levels[i]}%）还需跌 ${need}%（约${targetPrice}点）`;
            break;
        }
    }
    if (!nextInfo) nextInfo = '当前处于加仓区间，建议按批次执行';
    nextBuyInfo.textContent = nextInfo;
    
    const alertBar = document.getElementById('alertBar');
    if (dd <= CONFIG.initialDD) {
        alertBar.className = 'alert-bar alert-ready';
        alertBar.innerHTML = '<div class="alert-title">🚀 加仓信号已触发</div><div class="alert-desc">当前回撤达 ' + dd.toFixed(1) + '%，建议执行第1批买入</div>';
    } else {
        alertBar.className = 'alert-bar alert-wait';
        const dist = (dd - CONFIG.initialDD).toFixed(1);
        alertBar.innerHTML = '<div class="alert-title">⏳ 等待加仓信号</div><div class="alert-desc">距离首仓触发（回撤10%）还需跌 ' + dist + '%</div>';
    }
    
    // 只显示近1年记录
    const allCycles = backtestBuys(priceData);
    const oneYearAgo = new Date();
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    const cutoff = oneYearAgo.toISOString().split('T')[0];
    const cycles = allCycles.filter(c => c.startDate >= cutoff);
    const historyList = document.getElementById('historyList');
    
    if (cycles.length === 0) {
        historyList.innerHTML = '<div style="text-align:center; color:var(--gray); padding:20px;">近1年无加仓记录</div>';
    } else {
        historyList.innerHTML = cycles.slice().reverse().map(c => {
            const avgCost = c.buys.reduce((s,b) => s+b.price, 0) / c.buys.length;
            const endP = c.endPrice || last.close;
            const profit = ((endP / avgCost - 1) * 100).toFixed(1);
            const status = c.endDate ? `已结束 (+${profit}%)` : `<span style="color:var(--green)">持仓中 (+${profit}%)</span>`;
            const tags = c.buys.map(b => `<span class="history-tag tag-batch${b.batch}">${b.batch}批</span>`).join('');
            return `<div class="history-item">
                <div>
                    <div style="font-weight:600;">${c.startDate} ${tags}</div>
                    <div class="history-date">${c.buys.length}批买入 成本:${avgCost.toFixed(0)} 最低回撤:${c.lowestDD.toFixed(1)}%</div>
                </div>
                <div class="history-info">
                    <div class="history-price">${status}</div>
                    <div class="history-date">${c.endDate || '至今'}</div>
                </div>
            </div>`;
        }).join('');
    }
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

// ==================== 数据获取：雅虎财经（通过CORS代理）====================
function fetchYahooHistory() {
    return new Promise((resolve, reject) => {
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        const yahooUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EIXIC?interval=1d&range=1y';
        
        function tryProxy(index) {
            if (index >= proxies.length) {
                reject('所有代理均失败');
                return;
            }
            
            fetch(proxies[index] + encodeURIComponent(yahooUrl))
                .then(r => r.json())
                .then(data => {
                    if (data.chart && data.chart.result && data.chart.result[0]) {
                        const result = data.chart.result[0];
                        const timestamps = result.timestamp;
                        const closes = result.indicators.quote[0].close;
                        const hist = [];
                        for (let i = 0; i < timestamps.length; i++) {
                            if (closes[i] !== null) {
                                const date = new Date(timestamps[i] * 1000).toISOString().split('T')[0];
                                hist.push({ date, close: closes[i] });
                            }
                        }
                        resolve(hist);
                    } else {
                        reject('invalid data');
                    }
                })
                .catch(() => tryProxy(index + 1));
        }
        
        tryProxy(0);
    });
}

// ==================== 数据获取：腾讯实时（JSONP）====================
function fetchTencentRealtime() {
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://qt.gtimg.cn/q=ixic&_=' + Date.now();
        script.onload = function() {
            try {
                const v = window['v_ixic'];
                if (v) {
                    const content = v.replace(/^v_ixic=/, '').replace(/^"/, '').replace(/"$/, '');
                    const p = content.split(';');
                    const price = parseFloat(p[1]);
                    if (price > 0) {
                        resolve(price);
                    } else {
                        reject('invalid price');
                    }
                } else {
                    reject('no data');
                }
            } catch(e) { reject(e); }
        };
        script.onerror = reject;
        document.head.appendChild(script);
    });
}

// ==================== 主流程 ====================
async function init() {
    const hasLocal = loadLocal();
    
    try {
        const yahooData = await fetchYahooHistory();
        priceData = yahooData;
        saveData();
        console.log('雅虎数据获取成功:', yahooData.length, '条');
    } catch(e) {
        console.log('雅虎数据获取失败:', e);
        if (!hasLocal) {
            document.getElementById('loading').innerHTML = 
                '<div style="padding:20px;">' +
                '<p>⚠️ 数据获取失败</p>' +
                '<p style="font-size:13px; margin-top:10px;">请检查网络连接，或稍后重试</p>' +
                '<p style="font-size:12px; margin-top:10px; color:#666;">错误: ' + e + '</p>' +
                '</div>';
            return;
        }
    }
    
    try {
        const realPrice = await fetchTencentRealtime();
        const today = new Date().toISOString().split('T')[0];
        const last = priceData[priceData.length - 1];
        if (last && last.date === today) {
            last.close = realPrice;
        } else {
            priceData.push({ date: today, close: realPrice });
        }
        saveData();
    } catch(e) {
        console.log('实时数据获取失败:', e);
    }
    
    render();
}

init();
setInterval(init, 300000);
</script>
</body>
</html>
