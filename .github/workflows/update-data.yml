name: Update Nasdaq Data

on:
  schedule:
    - cron: '0 6 * * *'  # UTC 6:00 (北京时间 14:00)
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 获取完整历史用于数据增量更新
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'  # 不再使用pip缓存，避免requirements.txt依赖
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install yfinance pandas numpy requests
        # 验证安装
        python -c "import yfinance; print('yfinance version:', yfinance.__version__)"
        python -c "import pandas; print('pandas version:', pandas.__version__)"
    
    - name: Run update script
      run: |
        echo "Current time: $(date)"
        echo "Running update script..."
        python update_data.py
      timeout-minutes: 10  # 超时保护
    
    - name: Check output
      run: |
        if [ -f "data/nasdaq_data.json" ]; then
          echo "✅ Data file exists"
          size=$(stat -c%s "data/nasdaq_data.json")
          echo "File size: $size bytes"
          latest_date=$(python3 -c "import json; d=json.load(open('data/nasdaq_data.json')); print(sorted(d['daily_data'].keys())[-1])")
          echo "Latest data date: $latest_date"
        else
          echo "❌ Data file missing!"
          exit 1
        fi
    
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/nasdaq_data.json
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "Update data: $(date +'%Y-%m-%d')"
          git push
          echo "✅ Data updated successfully"
        fi
